<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baby Gift Opening Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:Poppins,sans-serif;
    background:linear-gradient(#FFF8F2,#F5E8D7);
    padding:20px;
    color:#6B4F3A;

}


.container{

    max-width:900px;
    margin:auto;

}


.header{

    text-align:center;
    margin-bottom:25px;

}


.header h1{

    font-size:34px;
    margin-bottom:5px;
    color:#8B5E3C;

}


.header p{

    font-size:18px;

}


#cardID{

    margin-top:15px;
    font-weight:bold;
    font-size:18px;
    color:#A67C52;

}



/* Bingo Board */

.board{

    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;

}



.cell{

    background:white;
    border-radius:15px;
    padding:18px;
    min-height:90px;

    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;

    cursor:pointer;

    font-weight:500;

    box-shadow:0 5px 12px rgba(0,0,0,.08);

    transition:.25s;

}



.cell:hover{

    transform:scale(1.04);

}



.marked{

    background:#B08968;
    color:white;

}



.center{

    font-size:45px;
    background:#8B5E3C;
    color:white;

}



/* Mobile */

@media(max-width:700px){

.board{

    grid-template-columns:repeat(5,1fr);
    gap:6px;

}


.cell{

    font-size:12px;
    padding:10px;
    min-height:70px;

}


.center{

    font-size:34px;

}

}



/* Confetti */

.confetti{

    position:fixed;
    top:-20px;
    width:10px;
    height:18px;
    border-radius:3px;
    animation:fall 4s linear forwards;
    z-index:9999;

}


@keyframes fall{

0%{

transform:translateY(0) rotate(0deg);
opacity:1;

}


100%{

transform:translateY(110vh) rotate(720deg);
opacity:0;

}

}


</style>


</head>


<body>


<div class="container">


<div class="header">


<h1>🧸 Baby Gift Opening Bingo</h1>


<p>
Tap a square only when that gift is opened.
</p>


<div id="cardID"></div>


</div>



<div class="board" id="bingo-board"></div>



</div>



<!-- Guest ID Generator -->
<script src="qr.js"></script>


<!-- Confetti + Bingo Winner -->
<script src="confetti.js"></script>


<!-- Main Bingo System -->
<script type="module" src="bingo.js"></script>



</body>

</html>
